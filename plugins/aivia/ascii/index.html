<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D ASCII Tunnel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  #screen {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.0;
    color: #00ff41;
    white-space: pre;
    letter-spacing: 1px;
    text-shadow: 0 0 4px rgba(0, 255, 65, 0.3);
  }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  button {
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    padding: 6px 14px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover, button.active {
    background: rgba(0, 255, 65, 0.15);
  }
  button:focus-visible {
    outline: 2px solid #00ff41;
    outline-offset: 2px;
  }
</style>
</head>
<body>
<pre id="screen" aria-live="off" role="img" aria-label="Animated 3D ASCII tunnel"></pre>

<div id="controls">
  <button id="btn-checker" class="active">Checker</button>
  <button id="btn-rings">Rings</button>
  <button id="btn-spiral">Spiral</button>
  <button id="btn-noise">Noise</button>
  <button id="btn-pause">Pause</button>
</div>

<script>
const W = 100;
const H = 50;
const chars = " .·:;+*%#@";
const screen = document.getElementById('screen');

let time = 0;
let speed = 0.08;
let paused = false;
let texture = 'checker';

// simple hash for noise texture
function hash(x, y) {
  let h = x * 374761393 + y * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  return ((h ^ (h >> 16)) & 0xff) / 255;
}

function getTexture(u, v) {
  switch (texture) {
    case 'checker':
      return ((Math.floor(u * 8) + Math.floor(v)) % 2) ? 1 : 0.15;
    case 'rings':
      return (Math.sin(v * 6.2832) * 0.5 + 0.5);
    case 'spiral':
      return (Math.sin(u * 12 + v * 4) * 0.5 + 0.5);
    case 'noise':
      return hash(Math.floor(u * 16) & 0xff, Math.floor(v * 8) & 0xff);
    default:
      return 1;
  }
}

function render() {
  if (!paused) time += speed;

  let out = '';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const dx = x - W / 2;
      const dy = (y - H / 2) * 2.0; // aspect correction
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 0.5) {
        out += ' ';
        continue;
      }

      const angle = Math.atan2(dy, dx);
      const u = angle / Math.PI; // -1 to 1
      const v = 1.0 / dist * 40 + time;

      const tex = getTexture(u, v);

      // depth fog: fade toward center (far away)
      const fog = Math.min(1, dist / 45);
      const brightness = tex * fog;

      const idx = Math.floor(brightness * (chars.length - 1));
      const ci = Math.max(0, Math.min(chars.length - 1, idx));
      out += chars[ci];
    }
    out += '\n';
  }
  screen.textContent = out;
  requestAnimationFrame(render);
}

// controls
const buttons = {
  'btn-checker': 'checker',
  'btn-rings': 'rings',
  'btn-spiral': 'spiral',
  'btn-noise': 'noise'
};

Object.entries(buttons).forEach(([id, tex]) => {
  document.getElementById(id).addEventListener('click', () => {
    texture = tex;
    document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('btn-pause').classList.toggle('active', paused);
  });
});

document.getElementById('btn-pause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? 'Play' : 'Pause';
  document.getElementById('btn-pause').classList.toggle('active', paused);
});

// keyboard: arrow up/down for speed, space for pause
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') speed = Math.min(0.3, speed + 0.02);
  if (e.key === 'ArrowDown') speed = Math.max(0.01, speed - 0.02);
  if (e.key === ' ') {
    e.preventDefault();
    document.getElementById('btn-pause').click();
  }
});

render();
</script>
</body>
</html>
